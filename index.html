       /* Modern reset and layout */
body { 
    margin: 0; 
    padding: 0; 
    display: flex; 
    flex-direction: column; 
    height: 100vh; /* Forces the body to be the full height of the screen */
    width: 100vw;
    font-family: 'Georgia', serif; 
    overflow: hidden; /* Prevents awkward double scrollbars */
}

/* Title Banner */
header {
    background-color: #2c3e50;
    color: #ecf0f1;
    padding: 20px;
    text-align: center;
    box-shadow: 0 2px 5px rgba(0,0,0,0.3);
    z-index: 1001;
    flex-shrink: 0; /* Prevents the banner from getting squished */
}
header h1 { margin: 0; font-size: 1.8em; letter-spacing: 1px; }
header p { margin: 5px 0 15px 0; font-size: 1em; opacity: 0.9; }
header a { color: #3498db; text-decoration: none; font-style: italic; }

/* Time Lapse Button */
#start-btn {
    background-color: #e67e22;
    color: white;
    border: none;
    padding: 10px 20px;
    font-size: 14px;
    cursor: pointer;
    border-radius: 4px;
}

/* THE FIX: Map Container */
#map-container { 
    flex-grow: 1; /* Tells this container to take up all remaining space */
    position: relative; 
    width: 100%;
}

#map { 
    height: 100%; /* Important: Takes 100% of the map-container's height */
    width: 100%; 
    background: #a5bfdd; 
}

#year-display {
    position: absolute;
    top: 20px;
    right: 20px;
    z-index: 1000;
    background: rgba(255, 255, 255, 0.9);
    padding: 10px 20px;
    font-size: 24px;
    font-weight: bold;
    border: 2px solid #2c3e50;
    border-radius: 5px;
}
    </style>
</head>

    </header>
