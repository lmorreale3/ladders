<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DALME Ladder Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* Modern reset and layout */
        body { margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; font-family: 'Georgia', serif; }
        
        /* Title Banner - Complementary Slate Color */
        header {
            background-color: #2c3e50;
            color: #ecf0f1;
            padding: 20px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            z-index: 1001;
        }
        header h1 { margin: 0; font-size: 1.8em; letter-spacing: 1px; }
        header p { margin: 5px 0 15px 0; font-size: 1em; opacity: 0.9; }
        header a { color: #3498db; text-decoration: none; font-style: italic; }
        header a:hover { text-decoration: underline; }

        /* Time Lapse Button */
        #start-btn {
            background-color: #e67e22;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            border-radius: 4px;
            transition: background 0.3s;
        }
        #start-btn:hover { background-color: #d35400; }
        #start-btn:disabled { background-color: #7f8c8d; cursor: not-allowed; }

        /* Map and Overlays */
        #map-container { flex-grow: 1; position: relative; }
        #map { height: 100%; width: 100%; background: #a5bfdd; }
        
        #year-display {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 20px;
            font-size: 24px;
            font-weight: bold;
            border: 2px solid #2c3e50;
            border-radius: 5px;
        }

        .popup-title { font-weight: bold; font-size: 1.1em; margin-bottom: 5px; }
    </style>
</head>
<body>

    <header>
        <h1>Ladders in Late Medieval Household Inventories</h1>
        <p>As found in the <a href="https://dalme.org/" target="_blank">DALME Project</a></p>
        <button id="start-btn" onclick="startTimeline()">Start Time Lapse</button>
    </header>

    <div id="map-container">
        <div id="year-display">Year: —</div>
        <div id="map"></div>
    </div>
